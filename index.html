<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0f11">
<title>PantryOS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e0f11'/%3E%3Crect x='7' y='13' width='18' height='13' rx='3' fill='%23c8f55a'/%3E%3Crect x='10' y='10' width='12' height='4' rx='2' fill='%23c8f55a'/%3E%3Crect x='13' y='7' width='6' height='4' rx='1.5' fill='%235af5c8'/%3E%3Crect x='11' y='16' width='4' height='6' rx='1' fill='%230e0f11'/%3E%3Crect x='17' y='16' width='4' height='6' rx='1' fill='%230e0f11'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e0f11'/%3E%3Crect x='7' y='13' width='18' height='13' rx='3' fill='%23c8f55a'/%3E%3Crect x='10' y='10' width='12' height='4' rx='2' fill='%23c8f55a'/%3E%3Crect x='13' y='7' width='6' height='4' rx='1.5' fill='%235af5c8'/%3E%3Crect x='11' y='16' width='4' height='6' rx='1' fill='%230e0f11'/%3E%3Crect x='17' y='16' width='4' height='6' rx='1' fill='%230e0f11'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface2: #1e2128;
  --border: #2a2d35;
  --accent: #c8f55a;
  --accent2: #5af5c8;
  --accent3: #f55a8a;
  --accent4: #f5c85a;
  --text: #e8eaf0;
  --text2: #8b8fa0;
  --text3: #555a6b;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
}
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.header-right { display: flex; gap: 10px; align-items: center; }
.cycle-badge {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  color: var(--text2);
}
.cycle-badge span { color: var(--accent4); }

/* NAV */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  flex-shrink: 0;
}
.nav-btn {
  padding: 10px 4px;
  border: none;
  background: none;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  border-right: 1px solid var(--border);
  transition: all 0.2s;
  text-align: center;
  letter-spacing: 0.3px;
  min-height: 44px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(200,245,90,0.2);
  user-select: none;
  -webkit-user-select: none;
}
.nav-btn:last-child { border-right: none; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface2); }
.nav-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

/* MAIN */
.main { flex: 1; overflow-y: auto; padding: 20px; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 14px;
}

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
.stat-sub { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-top: 4px; }
.green { color: var(--accent); }
.teal { color: var(--accent2); }
.red { color: var(--accent3); }
.yellow { color: var(--accent4); }

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
.btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #0e0f11; }
.btn-primary:hover { background: #d4ff66; }
.btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--text2); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-danger { background: var(--accent3); color: #fff; }
.btn-teal { background: var(--accent2); color: #0e0f11; }
.btn-yellow { background: var(--accent4); color: #0e0f11; }

/* PRODUCT LIST */
.product-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.product-item:hover { border-color: var(--text3); }
.product-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.product-name { font-size: 14px; font-weight: 700; }
.product-price { font-family: var(--mono); font-size: 13px; color: var(--accent); font-weight: 500; }
.product-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
}
.tag-monthly { background: #1a2d0e; color: var(--accent); border: 1px solid #2d5018; }
.tag-quarterly { background: #1a1d2d; color: var(--accent2); border: 1px solid #18305a; }
.tag-category {
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
}
.tag-store { color: var(--text3); font-family: var(--mono); font-size: 10px; }
.product-stock { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
.stock-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 4px; }
.stock-bar { height: 4px; border-radius: 4px; transition: width 0.3s; }
.stock-label { font-family: var(--mono); font-size: 10px; color: var(--text2); }

/* FORM */
.form-grid { display: grid; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text2); }
input, select, textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  padding: 10px 12px;
  width: 100%;
  transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}
select option { background: var(--surface2); }
textarea { resize: vertical; min-height: 70px; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: 800; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 18px; line-height: 1; font-family: var(--sans); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }

/* TABS inside modal */
.inner-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.inner-tab {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  transition: all 0.15s;
}
.inner-tab.active { background: var(--accent); color: #0e0f11; border-color: var(--accent); }

/* ANALYSIS */
.analysis-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.analysis-row:last-child { border-bottom: none; }
.analysis-name { flex: 1; font-size: 13px; font-weight: 600; }
.analysis-bar-wrap { width: 120px; background: var(--border); border-radius: 4px; height: 6px; }
.analysis-bar { height: 6px; border-radius: 4px; }
.analysis-val { font-family: var(--mono); font-size: 12px; color: var(--text2); width: 60px; text-align: right; }

/* CSV INFO BOX */
.info-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: var(--radius);
  padding: 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  line-height: 1.8;
  margin-bottom: 14px;
}
.info-box strong { color: var(--accent2); }

/* MONTH END LOG */
.log-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.log-item:last-child { border-bottom: none; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.log-text { flex: 1; font-size: 13px; line-height: 1.5; }
.log-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }

/* Shopping list */
.shop-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.shop-item:last-child { border-bottom: none; }
.shop-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.shop-check.checked { background: var(--accent); border-color: var(--accent); }
.shop-check.checked::after { content: '✓'; color: #0e0f11; font-size: 12px; font-weight: 800; }
.shop-name { flex: 1; font-size: 13px; font-weight: 600; }
.shop-name.checked-text { text-decoration: line-through; color: var(--text3); }
.shop-store { font-family: var(--mono); font-size: 11px; color: var(--text2); }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.empty p { font-size: 13px; line-height: 1.5; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: #0e0f11;
  padding: 12px 20px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 13px;
  z-index: 300;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input { padding-left: 36px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

/* FILTERS */
.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip.active { background: var(--accent); color: #0e0f11; border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pantry<span>OS</span></div>
  <div class="header-right">
    <div class="cycle-badge">Cycle: <span id="current-cycle-label">Mar 2025</span></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-tab="dashboard">🏠 Home</button>
  <button class="nav-btn" data-tab="inventory">📦 Stock</button>
  <button class="nav-btn" data-tab="shopping">🛒 Shop</button>
  <button class="nav-btn" data-tab="monthend">📅 Month</button>
  <button class="nav-btn" data-tab="analysis">📊 Analysis</button>
  <button class="nav-btn" data-tab="recipes">🍲 Recipes</button>
  <button class="nav-btn" data-tab="importexport">📁 CSV</button>
  <button class="nav-btn" data-tab="settings">⚙️ Settings</button>
</div>

<div class="main" id="main-content">
  <!-- Dynamic content here -->
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-inner">
    <!-- dynamic -->
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===================== DATA STORE =====================
const STORAGE_KEY = 'pantryos_v2';

const DEFAULT_UNITS = [
  // Nigerian dry measures
  'Derica','Paint','Mudu','Debe',
  // Packaged goods
  'Carton','Pack','Roll','Sachet','Bottle','Bag','Tin','Crate',
  // Standard measures
  'kg','g','L','cl','ml',
  // Loose / count
  'Piece','Cup','Bunch','Wrap','Bundle','Dozen','Unit'
];

const PURCHASE_TYPES = ['monthly','quarterly','top-up'];

function allUnits() { return [...DEFAULT_UNITS, ...(state.customUnits||[])]; }
function allCategories() { return [...CATEGORIES, ...(state.customCategories||[])]; }
function allStores() { return [...new Set([...( state.stores||[])])]; }

function loadData() {
  try {
    // Try new key first, then migrate from old key
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) raw = localStorage.getItem('pantryos_v1');
    if (raw) {
      const data = JSON.parse(raw);
      // Ensure new fields exist
      if (!data.customUnits) data.customUnits = [];
      if (!data.customCategories) data.customCategories = [];
      if (!data.customStores) data.customStores = [];
      if (!data.stockSnapshots) data.stockSnapshots = [];
      if (!data.settings.lastBackup) data.settings.lastBackup = null;
      if (!data.settings.sheetsConnected) data.settings.sheetsConnected = false;
      if (!data.settings.gClientId) data.settings.gClientId = '';
      if (!data.settings.sheetId) data.settings.sheetId = '';
      return data;
    }
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  // Auto-backup to Drive on every save if connected
  if (state.settings.sheetsConnected && typeof gapi !== 'undefined') {
    try { driveBackupDebounced(); } catch(e) {}
  }
}

let _driveBackupTimer = null;
function driveBackupDebounced() {
  clearTimeout(_driveBackupTimer);
  _driveBackupTimer = setTimeout(driveBackup, 3000); // wait 3s after last save
}

function getDefaultData() {
  return {
    products: [],
    purchases: [],
    monthEndLogs: [],
    stockSnapshots: [],
    stores: ['Shoprite','Justrite','Mallam Market'],
    customUnits: [],
    customCategories: [],
    customStores: [],
    settings: {
      currentCycle: getCurrentCycleKey(),
      currency: '₦',
      gClientId: '',
      sheetId: '',
      sheetsConnected: false,
      lastSync: null,
      lastBackup: null
    }
  };
}

function getCurrentCycleKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function formatCycleLabel(key) {
  const [y, m] = key.split('-');
  return new Date(y, m-1, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

let state = loadData();

// ===================== CATEGORIES =====================
const CATEGORIES = [
  'Proteins', 'Grains & Carbs', 'Dairy & Eggs', 'Fruits', 'Vegetables',
  'Legumes & Pulses', 'Fats & Oils', 'Beverages', 'Snacks & Confectionery',
  'Condiments & Sauces', 'Spices & Herbs', 'Baking Supplies',
  'Frozen Foods', 'Canned & Preserved', 'Cleaning Supplies',
  'Personal Care', 'Paper & Household', 'Baby & Infant', 'Pet Supplies', 'Other'
];

const CAT_COLORS = {
  'Proteins': '#f55a8a',
  'Grains & Carbs': '#f5c85a',
  'Dairy & Eggs': '#5af5c8',
  'Fruits': '#c8f55a',
  'Vegetables': '#5af55a',
  'Legumes & Pulses': '#f5a05a',
  'Fats & Oils': '#a05af5',
  'Beverages': '#5ab8f5',
  'Snacks & Confectionery': '#f55a5a',
  'Condiments & Sauces': '#f5f55a',
  'Spices & Herbs': '#8af55a',
  'Baking Supplies': '#f5c8a0',
  'Frozen Foods': '#a0c8f5',
  'Canned & Preserved': '#c8a05a',
  'Cleaning Supplies': '#5af5f5',
  'Personal Care': '#f5a0c8',
  'Paper & Household': '#c8c8f5',
  'Baby & Infant': '#f5d0d0',
  'Pet Supplies': '#d0f5d0',
  'Other': '#8b8fa0'
};

// ===================== TABS =====================
let currentTab = 'dashboard';
let _meViewCycle = null;

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderTab();
}

function renderTab() {
  const m = document.getElementById('main-content');
  try {
    switch(currentTab) {
      case 'dashboard': m.innerHTML = renderDashboard(); break;
      case 'inventory': m.innerHTML = renderInventory(); break;
      case 'shopping': m.innerHTML = renderShopping(); break;
      case 'monthend': m.innerHTML = renderMonthEnd(); break;
      case 'analysis': m.innerHTML = renderAnalysis(); break;
      case 'importexport': m.innerHTML = renderCSV(); setTimeout(initSheetsUI, 80); break;
      case 'recipes':     m.innerHTML = renderRecipes(); break;
      case 'settings': m.innerHTML = renderSettings(); break;
    }
  } catch(err) {
    console.error('PantryOS renderTab error:', err);
    m.innerHTML = `
      <div class="card" style="border-color:var(--accent3);">
        <div class="card-title" style="color:var(--accent3);">Tab Error</div>
        <p style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;">
          Something went wrong loading this tab.<br>
          <span style="font-family:var(--mono);font-size:11px;color:var(--accent3);">${err.message}</span>
        </p>
        <button class="btn btn-outline" onclick="currentTab='dashboard';renderTab()">← Back to Home</button>
      </div>
    `;
  }
  updateCycleLabel();
}

function updateCycleLabel() {
  document.getElementById('current-cycle-label').textContent = formatCycleLabel(state.settings.currentCycle);
}

// ===================== CYCLE HELPERS =====================
function getCyclePurchases(cycle) {
  // Stocking view: what was bought FOR this cycle (inventory health)
  return state.purchases.filter(p => (p.stockingCycle || p.cycle) === cycle);
}

function getSpendPurchases(cycle) {
  // Spend view: what was actually bought IN this cycle (financial)
  return state.purchases.filter(p => (p.purchaseCycle || p.cycle) === cycle);
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const cycle = state.settings.currentCycle;
  const products = state.products;
  const cyclePurchases = getCyclePurchases(cycle);   // stocking-based for inventory
  const spendPurchases = getSpendPurchases(cycle);   // purchase-date-based for spend

  const totalSpend = spendPurchases.reduce((s, p) => s + (p.price * p.qty), 0);

// ===================== HISTORICAL QTY SUGGESTION =====================
function suggestedQty(product) {
  // Returns {qty, basis} where basis explains how we got the suggestion
  const buys = state.purchases
    .filter(p => p.productId === product.id && p.qty > 0 && p.purchaseType !== 'top-up')
    .sort((a,b) => (b.purchaseCycle||b.cycle).localeCompare(a.purchaseCycle||a.cycle));

  if (buys.length === 0) {
    // No history — fall back to plannedQty - currentStock
    const need = Math.max(0, (product.plannedQty||0) - (product.currentStock||0));
    return { qty: need, basis: 'planned', hint: null };
  }

  // Use last 3 non-topup purchases to compute avg qty bought
  const recent = buys.slice(0, 3);
  const avgBought = recent.reduce((s,b) => s+b.qty, 0) / recent.length;
  const need = Math.max(0, avgBought - (product.currentStock||0));
  const rounded = Math.round(need * 4) / 4; // round to nearest 0.25

  const hint = recent.length >= 2
    ? `Avg of last ${recent.length} buys: ${avgBought.toFixed(1)} ${product.unit||''}`
    : `Based on last buy: ${recent[0].qty} ${product.unit||''}`;

  return { qty: Math.max(0, rounded), basis: 'history', hint };
}

  const pid = document.getElementById('asl-product').value;

  shopEdits[pid].qty = qty;
  if (price) shopEdits[pid].price = price;

function buyAllChecked() {
  const cycle = state.settings.currentCycle;
  const checked = state.products.filter(p => shopChecked[p.id]);
  if (checked.length === 0) { showToast('Check items you bought first'); return; }
  checked.forEach(p => {
    const e = shopEdits[p.id] || {};
    const qty = e.qty != null ? e.qty : Math.max(0, (p.plannedQty||0)-(p.currentStock||0));
    const price = e.price != null ? e.price : (p.price || 0);
    const store = e.store || p.store || '';
    p.currentStock = (p.currentStock||0) + qty;
    if (price && price !== p.price) p.price = price;
    if (store) p.store = store;
    if (p._shopOverride) delete p._shopOverride;
    state.purchases.push({
      id:'buy_'+Date.now()+'_'+Math.random(), productId:p.id, productName:p.name,
      qty, price, store, date:new Date().toISOString().split('T')[0],
      purchaseCycle:cycle, stockingCycle:cycle, cycle,
      purchaseType:'monthly', isExtra:false, unit:p.unit||''
    });
    delete shopChecked[p.id];
    delete shopEdits[p.id];
  });
  saveData();
  showToast(`${checked.length} item${checked.length>1?'s':''} logged!`);
  renderTab();
}

      ${cyclePurchases.map(p => `

function renderCycleHistory() {
  const cycles = [...new Set(state.purchases.map(p => p.cycle))].sort().reverse().slice(0, 6);
  if (cycles.length === 0) return `<div style="color:var(--text2);font-size:13px;">No history yet.</div>`;
  return cycles.map(c => {
    const cyclePurchases = state.purchases.filter(p => p.cycle === c);
    const total = cyclePurchases.reduce((s, p) => s + (p.price * p.qty), 0);
    const extras = cyclePurchases.filter(p => p.isExtra).length;
    return `
      <div class="analysis-row">
        <div class="analysis-name">${formatCycleLabel(c)}</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text2)">${cyclePurchases.length} items</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--accent4)">${extras} extra</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--accent)">${state.settings.currency}${total.toFixed(0)}</div>
      </div>
    `;
  }).join('');
}

// ===================== ANALYSIS =====================
let analysisView = 'overview';
let analysisCatFilter = '';
let analysisFrom = '';
let analysisTo = '';
let priceProductFilter = '';
let priceFromCycle = '';
let priceToCycle = '';

function cycleSpend(c) {
  return state.purchases.filter(p => (p.purchaseCycle||p.cycle) === c).reduce((s,p) => s+p.price*p.qty, 0);
}
function cycleKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function diffLabel(curr, prev) {
  if (!prev || prev === 0) return { text:'—', color:'var(--text3)', arrow:'', raw:0 };
  const pct = ((curr-prev)/prev)*100;
  return { text:`${pct>=0?'+':''}${pct.toFixed(1)}%`, color:pct>0?'var(--accent3)':'var(--accent)', arrow:pct>0?'↑':'↓', raw:pct };
}
function formatMoney(v) {
  return `${state.settings.currency}${(parseFloat(v)||0).toLocaleString('en-NG',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
}
function allCycles() {
  const s = new Set();
  state.purchases.forEach(p => { if(p.purchaseCycle)s.add(p.purchaseCycle); if(p.stockingCycle)s.add(p.stockingCycle); if(p.cycle)s.add(p.cycle); });
  return [...s].sort();
}

// Filtered cycle spend — respects category + timeline filters
function filteredCycleSpend(c) {
  return state.purchases.filter(p => {
    if ((p.purchaseCycle||p.cycle) !== c) return false;
    if (analysisCatFilter) {
      const prod = state.products.find(pr => pr.id === p.productId);
      if ((prod?.category||'Other') !== analysisCatFilter) return false;
    }
    return true;
  }).reduce((s,p) => s+p.price*p.qty, 0);
}
function inAnalysisRange(c) {
  if (analysisFrom && c < analysisFrom) return false;
  if (analysisTo && c > analysisTo) return false;
  return true;
}

function renderAnalysis() {
  const cycles = allCycles();
  const allCats = [...new Set(state.products.map(p=>p.category).filter(Boolean))].sort();
  return `
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;">
    ${['overview','mom','qoq','yoy','category','prices'].map(v=>`
    <div class="inner-tab ${analysisView===v?'active':''}" onclick="analysisView='${v}';renderTab()">
      ${v==='overview'?'Overview':v==='mom'?'MoM':v==='qoq'?'QoQ':v==='yoy'?'YoY':v==='category'?'By Category':'Prices'}
    </div>`).join('')}
  </div>

  ${analysisView !== 'overview' && analysisView !== 'prices' ? `
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;">
    <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;">Filter</div>
    <div class="form-row" style="margin-bottom:8px;">
      <div class="form-group"><label>From</label>
        <select onchange="analysisFrom=this.value;renderTab()">
          <option value="">Earliest</option>
          ${cycles.map(c=>`<option value="${c}" ${c===analysisFrom?'selected':''}>${formatCycleLabel(c)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>To</label>
        <select onchange="analysisTo=this.value;renderTab()">
          <option value="">Latest</option>
          ${cycles.map(c=>`<option value="${c}" ${c===analysisTo?'selected':''}>${formatCycleLabel(c)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label>Category</label>
      <select onchange="analysisCatFilter=this.value;renderTab()">
        <option value="">All Categories</option>
        ${allCats.map(c=>`<option value="${c}" ${c===analysisCatFilter?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    ${analysisCatFilter||analysisFrom||analysisTo?`<button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="analysisCatFilter='';analysisFrom='';analysisTo='';renderTab()">✕ Clear filters</button>`:''}
  </div>` : ''}

  ${analysisView==='overview' ? renderAnalysisOverview() : ''}
  ${analysisView==='mom' ? renderMoM() : ''}
  ${analysisView==='qoq' ? renderQoQ() : ''}
  ${analysisView==='yoy' ? renderYoY() : ''}
  ${analysisView==='category' ? renderCategoryDrilldown() : ''}
  ${analysisView==='prices' ? renderPriceTracker() : ''}`;
}

function renderAnalysisOverview() {
  const cycle = state.settings.currentCycle;
  const products = state.products;
  const byCategory = {};
  allCategories().forEach(c => { byCategory[c] = {count:0,spend:0,stockouts:0}; });
  products.forEach(p => {
    const cat = p.category||'Other';
    if (!byCategory[cat]) byCategory[cat]={count:0,spend:0,stockouts:0};
    byCategory[cat].count++;
    if ((p.currentStock||0)===0 && p.plannedQty>0) byCategory[cat].stockouts++;
  });
  state.purchases.filter(p=>(p.purchaseCycle||p.cycle)===cycle).forEach(p=>{
    const prod=products.find(pr=>pr.id===p.productId);
    const cat=prod?.category||'Other';
    if(!byCategory[cat])byCategory[cat]={count:0,spend:0,stockouts:0};
    byCategory[cat].spend+=p.price*p.qty;
  });
  const activeCats=Object.entries(byCategory).filter(([,v])=>v.count>0||v.spend>0).sort((a,b)=>b[1].spend-a[1].spend);
  const maxSpend=Math.max(...activeCats.map(([,v])=>v.spend),1);
  const totalPlanned=products.filter(p=>p.plannedQty>0);
  const stockoutRate=totalPlanned.length?Math.round(totalPlanned.filter(p=>(p.currentStock||0)===0).length/totalPlanned.length*100):0;
  const overstockRate=totalPlanned.length?Math.round(totalPlanned.filter(p=>(p.currentStock||0)>(p.plannedQty||0)*1.5).length/totalPlanned.length*100):0;
  const byStore={};
  state.purchases.forEach(p=>{const s=p.store||'Unknown';if(!byStore[s])byStore[s]=0;byStore[s]+=p.price*p.qty;});

  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Stock-Out Rate</div><div class="stat-value red">${stockoutRate}%</div><div class="stat-sub">of planned items</div></div>
    <div class="stat-card"><div class="stat-label">Overstock Rate</div><div class="stat-value teal">${overstockRate}%</div><div class="stat-sub">&gt;150% of plan</div></div>
    <div class="stat-card"><div class="stat-label">Monthly Items</div><div class="stat-value green">${products.filter(p=>p.cycle==='monthly').length}</div></div>
    <div class="stat-card"><div class="stat-label">Quarterly Items</div><div class="stat-value teal">${products.filter(p=>p.cycle==='quarterly').length}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Spend by Category — ${formatCycleLabel(cycle)}</div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Tap any category to drill down</div>
    ${activeCats.length===0?'<div style="color:var(--text2);font-size:13px;">Log purchases to see analysis.</div>':''}
    ${activeCats.map(([cat,v])=>{
      const pct=Math.round((v.spend/maxSpend)*100);
      const color=CAT_COLORS[cat]||'#8b8fa0';
      return`<div class="analysis-row" style="cursor:pointer;" onclick="analysisCatFilter='${cat}';analysisView='category';renderTab()">
        <div class="analysis-name" style="color:${color}">${cat}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3)">${v.count}i${v.stockouts>0?' · '+v.stockouts+'⚠':''}</div>
        <div class="analysis-bar-wrap"><div class="analysis-bar" style="width:${Math.max(pct,2)}%;background:${color}"></div></div>
        <div class="analysis-val">${v.spend>0?formatMoney(v.spend):'—'}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="card">
    <div class="card-title">Spend by Store (All Time)</div>
    ${Object.entries(byStore).length===0?'<div style="color:var(--text2);font-size:13px;">No data yet.</div>':''}
    ${Object.entries(byStore).sort((a,b)=>b[1]-a[1]).map(([store,spend])=>`
    <div class="analysis-row">
      <div class="analysis-name">${store}</div>
      <div class="analysis-val" style="color:var(--accent)">${formatMoney(spend)}</div>
    </div>`).join('')}
  </div>`;
}

function renderCategoryDrilldown() {
  const allCats=[...new Set(state.products.map(p=>p.category).filter(Boolean))].sort();
  const cat=analysisCatFilter||allCats[0]||'';
  if(!cat) return'<div class="card"><div style="color:var(--text2);font-size:12px;">Select a category above.</div></div>';
  const catColor=CAT_COLORS[cat]||'var(--accent2)';
  const catProducts=state.products.filter(p=>p.category===cat);
  const cycles=allCycles().filter(inAnalysisRange).sort();

  const cycleData=cycles.map(c=>({
    cycle:c,
    spend:state.purchases.filter(p=>(p.purchaseCycle||p.cycle)===c&&(state.products.find(pr=>pr.id===p.productId)?.category||'Other')===cat).reduce((s,p)=>s+p.price*p.qty,0),
    qty:state.purchases.filter(p=>(p.purchaseCycle||p.cycle)===c&&(state.products.find(pr=>pr.id===p.productId)?.category||'Other')===cat).reduce((s,p)=>s+p.qty,0),
    topups:state.purchases.filter(p=>(p.purchaseCycle||p.cycle)===c&&p.purchaseType==='top-up'&&(state.products.find(pr=>pr.id===p.productId)?.category||'Other')===cat).length
  })).filter(c=>c.spend>0);

  const totalSpend=cycleData.reduce((s,c)=>s+c.spend,0);
  const avgSpend=cycleData.length?totalSpend/cycleData.length:0;
  const maxSpend=Math.max(...cycleData.map(c=>c.spend),1);

  const productRows=catProducts.map(p=>{
    const buys=state.purchases.filter(b=>b.productId===p.id&&inAnalysisRange(b.purchaseCycle||b.cycle));
    const spend=buys.reduce((s,b)=>s+b.price*b.qty,0);
    const qty=buys.reduce((s,b)=>s+b.qty,0);
    const prices=buys.map(b=>b.price).filter(Boolean);
    const avgPrice=prices.length?prices.reduce((s,v)=>s+v,0)/prices.length:p.price||0;
    const lastBuy=[...buys].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    return{p,buys,spend,qty,avgPrice,lastBuy};
  }).filter(r=>r.buys.length>0||r.p.plannedQty>0).sort((a,b)=>b.spend-a.spend);

  const maxProdSpend=Math.max(...productRows.map(r=>r.spend),1);

  return`
  <div class="card" style="border-color:${catColor}55;margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
      <div>
        <div style="font-size:16px;font-weight:800;color:${catColor}">${cat}</div>
        <div style="font-size:11px;color:var(--text3)">${catProducts.length} products · ${cycleData.length} cycles with data${analysisFrom||analysisTo?` · filtered`:''}
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:800;color:var(--accent)">${formatMoney(totalSpend)}</div>
        <div style="font-size:10px;color:var(--text3)">avg ${formatMoney(avgSpend)}/cycle</div>
      </div>
    </div>
    ${cycleData.length===0?'<div style="color:var(--text2);font-size:12px;">No purchase data in this range.</div>':''}
    ${cycleData.map(c=>{
      const pct=Math.round((c.spend/maxSpend)*100);
      return`<div class="analysis-row">
        <div style="min-width:65px;font-family:var(--mono);font-size:11px;color:var(--text2)">${formatCycleLabel(c.cycle)}</div>
        <div class="analysis-bar-wrap" style="flex:1"><div class="analysis-bar" style="width:${Math.max(pct,2)}%;background:${catColor}"></div></div>
        <div style="font-family:var(--mono);font-size:11px;width:80px;text-align:right;">${formatMoney(c.spend)}</div>
        ${c.topups>0?`<div style="font-family:var(--mono);font-size:10px;color:var(--accent4);width:28px;text-align:right;">${c.topups}tu</div>`:'<div style="width:28px"></div>'}
      </div>`;
    }).join('')}
  </div>

  <div class="card">
    <div class="card-title">Products in ${cat}</div>
    ${productRows.map(({p,buys,spend,qty,avgPrice,lastBuy})=>{
      const pct=Math.round((spend/maxProdSpend)*100);
      return`<div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <div style="font-size:12px;font-weight:700;">${p.name}</div>
          <div style="font-family:var(--mono);font-size:12px;color:var(--accent)">${formatMoney(spend)}</div>
        </div>
        <div class="analysis-bar-wrap" style="margin-bottom:5px;"><div class="analysis-bar" style="width:${Math.max(pct,2)}%;background:${catColor}"></div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Qty: <strong style="color:var(--text2)">${qty} ${p.unit||''}</strong></span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Avg price: <strong style="color:var(--text2)">${formatMoney(avgPrice)}</strong></span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Purchases: <strong style="color:var(--text2)">${buys.length}</strong></span>
          ${lastBuy?`<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Last: <strong style="color:var(--text2)">${formatCycleLabel(lastBuy.purchaseCycle||lastBuy.cycle)}</strong></span>`:''}
        </div>
      </div>`;
    }).join('')}
    ${productRows.length===0?'<div style="color:var(--text2);font-size:12px;">No data yet.</div>':''}
  </div>`;
}

function renderMoM() {
  const cycle=state.settings.currentCycle;
  const [cy,cm]=cycle.split('-').map(Number);
  // Build up to last 12 months, filter by range
  const candidates=[];
  for(let i=0;i<12;i++){let m=cm-i,y=cy;while(m<=0){m+=12;y--;}candidates.push(cycleKey(y,m));}
  const displayCycles=candidates.filter(c=>inAnalysisRange(c)).reverse();
  if(!displayCycles.length) return'<div class="card"><div style="color:var(--text2);font-size:12px;">No data in selected range.</div></div>';

  const rows=displayCycles.map((c,i)=>({cycle:c,spend:filteredCycleSpend(c),diff:diffLabel(filteredCycleSpend(c),i>0?filteredCycleSpend(displayCycles[i-1]):null)}));
  const maxSpend=Math.max(...rows.map(r=>r.spend),1);

  // Category matrix — use purchaseCycle (fixed)
  const activeCats=analysisCatFilter?[analysisCatFilter]:[...new Set(state.products.map(p=>p.category).filter(Boolean))];
  const catMoM={};
  activeCats.forEach(cat=>{
    const vals=displayCycles.map(c=>state.purchases.filter(p=>{
      const pc=p.purchaseCycle||p.cycle;
      const prod=state.products.find(pr=>pr.id===p.productId);
      return pc===c&&(prod?.category||'Other')===cat;
    }).reduce((s,p)=>s+p.price*p.qty,0));
    if(vals.some(v=>v>0))catMoM[cat]=vals;
  });

  return`
  <div class="card">
    <div class="card-title">Month-over-Month${analysisCatFilter?' — '+analysisCatFilter:''}</div>
    ${rows.every(r=>r.spend===0)?'<div style="color:var(--text2);font-size:12px;">No data in range. Log purchases or adjust filters.</div>':''}
    ${rows.map(r=>{const bp=Math.round((r.spend/maxSpend)*100);return`<div class="analysis-row">
      <div style="min-width:65px;font-family:var(--mono);font-size:11px;color:${r.cycle===cycle?'var(--accent)':'var(--text2)'}">${formatCycleLabel(r.cycle)}</div>
      <div class="analysis-bar-wrap" style="flex:1"><div class="analysis-bar" style="width:${Math.max(bp,2)}%;background:${r.cycle===cycle?'var(--accent)':'var(--text3)'}"></div></div>
      <div style="font-family:var(--mono);font-size:11px;width:85px;text-align:right;">${formatMoney(r.spend)}</div>
      <div style="font-family:var(--mono);font-size:11px;width:58px;text-align:right;color:${r.diff.color}">${r.diff.arrow} ${r.diff.text}</div>
    </div>`;}).join('')}
  </div>
  ${Object.keys(catMoM).length>0?`
  <div class="card">
    <div class="card-title">Category Breakdown</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:10px;font-family:var(--mono);">
        <thead><tr>
          <th style="text-align:left;padding:5px 3px;color:var(--text3);">CAT</th>
          ${displayCycles.map(c=>`<th style="text-align:right;padding:5px 3px;color:${c===cycle?'var(--accent)':'var(--text3)'};">${formatCycleLabel(c).split(' ')[0]}</th>`).join('')}
          <th style="text-align:right;padding:5px 3px;color:var(--text3);">TOTAL</th>
        </tr></thead>
        <tbody>${Object.entries(catMoM).map(([cat,vals])=>`
          <tr>
            <td style="padding:4px 3px;color:${CAT_COLORS[cat]||'var(--text2)'};">${cat}</td>
            ${vals.map((v,i)=>{const d=diffLabel(v,i>0?vals[i-1]:null);return`<td style="text-align:right;padding:4px 3px;color:${v===0?'var(--text3)':d.raw>0?'var(--accent3)':d.raw<0?'var(--accent)':'var(--text)'};">${v>0?formatMoney(v):'—'}</td>`;}).join('')}
            <td style="text-align:right;padding:4px 3px;color:var(--accent4);font-weight:700;">${formatMoney(vals.reduce((s,v)=>s+v,0))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}`;
}

function renderQoQ() {
  const cycle=state.settings.currentCycle;
  const [cy,cm]=cycle.split('-').map(Number);
  const quarters=[];
  for(let i=0;i<8;i++){
    let baseM=Math.floor((cm-1)/3)*3+1-(i*3),baseY=cy;
    while(baseM<=0){baseM+=12;baseY--;}
    const months=[0,1,2].map(off=>{let m=baseM+off,y=baseY;if(m>12){m-=12;y++;}return cycleKey(y,m);});
    if(!months.some(m=>inAnalysisRange(m)))continue;
    const spend=months.reduce((s,c)=>s+filteredCycleSpend(c),0);
    const topups=state.purchases.filter(p=>{
      const pc=p.purchaseCycle||p.cycle;
      const prod=state.products.find(pr=>pr.id===p.productId);
      return months.includes(pc)&&p.purchaseType==='top-up'&&(!analysisCatFilter||(prod?.category||'Other')===analysisCatFilter);
    }).length;
    quarters.push({label:`Q${Math.ceil(baseM/3)} ${baseY}`,months,spend,topups});
  }
  quarters.reverse();
  const rows=quarters.map((q,i)=>({...q,diff:diffLabel(q.spend,i>0?quarters[i-1].spend:null)}));
  const maxSpend=Math.max(...rows.map(r=>r.spend),1);

  // Category QoQ table — use purchaseCycle (fixed)
  const activeCats=analysisCatFilter?[analysisCatFilter]:[...new Set(state.products.map(p=>p.category).filter(Boolean))];
  const catQoQ={};
  activeCats.forEach(cat=>{
    const vals=quarters.map(q=>state.purchases.filter(p=>{
      const pc=p.purchaseCycle||p.cycle;
      const prod=state.products.find(pr=>pr.id===p.productId);
      return q.months.includes(pc)&&(prod?.category||'Other')===cat;
    }).reduce((s,p)=>s+p.price*p.qty,0));
    if(vals.some(v=>v>0))catQoQ[cat]=vals;
  });

  return`
  <div class="card">
    <div class="card-title">Quarter-over-Quarter${analysisCatFilter?' — '+analysisCatFilter:''}</div>
    ${rows.every(r=>r.spend===0)?'<div style="color:var(--text2);font-size:12px;">No data in range.</div>':''}
    ${rows.map(r=>{const bp=Math.round((r.spend/maxSpend)*100);return`<div class="analysis-row">
      <div style="min-width:65px;font-family:var(--mono);font-size:11px;color:var(--text2)">${r.label}</div>
      <div class="analysis-bar-wrap" style="flex:1"><div class="analysis-bar" style="width:${Math.max(bp,2)}%;background:var(--accent2)"></div></div>
      <div style="font-family:var(--mono);font-size:11px;width:85px;text-align:right;">${formatMoney(r.spend)}</div>
      <div style="font-family:var(--mono);font-size:11px;width:58px;text-align:right;color:${r.diff.color}">${r.diff.arrow} ${r.diff.text}</div>
      ${r.topups>0?`<div style="font-family:var(--mono);font-size:10px;color:var(--accent4);width:28px;text-align:right;">${r.topups}tu</div>`:''}
    </div>`;}).join('')}
  </div>
  ${Object.keys(catQoQ).length>0?`
  <div class="card">
    <div class="card-title">Category Breakdown</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:10px;font-family:var(--mono);">
        <thead><tr>
          <th style="text-align:left;padding:5px 3px;color:var(--text3);">CAT</th>
          ${quarters.map(q=>`<th style="text-align:right;padding:5px 3px;color:var(--text3);">${q.label}</th>`).join('')}
          <th style="text-align:right;padding:5px 3px;color:var(--text3);">TOTAL</th>
        </tr></thead>
        <tbody>${Object.entries(catQoQ).map(([cat,vals])=>`
          <tr>
            <td style="padding:4px 3px;color:${CAT_COLORS[cat]||'var(--text2)'};">${cat}</td>
            ${vals.map((v,i)=>{const d=diffLabel(v,i>0?vals[i-1]:null);return`<td style="text-align:right;padding:4px 3px;color:${v===0?'var(--text3)':d.raw>0?'var(--accent3)':d.raw<0?'var(--accent)':'var(--text)'};">${v>0?formatMoney(v):'—'}</td>`;}).join('')}
            <td style="text-align:right;padding:4px 3px;color:var(--accent4);font-weight:700;">${formatMoney(vals.reduce((s,v)=>s+v,0))}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}`;
}

function renderYoY() {
  const cycle=state.settings.currentCycle;
  const [cy]=cycle.split('-').map(Number);
  const cm=parseInt(cycle.split('-')[1]);
  const years=[];
  for(let y=cy-3;y<=cy;y++){
    const months=Array.from({length:12},(_,i)=>cycleKey(y,i+1)).filter(m=>inAnalysisRange(m));
    years.push({year:y,spend:months.reduce((s,c)=>s+filteredCycleSpend(c),0),months});
  }
  const rows=years.map((yr,i)=>({...yr,diff:diffLabel(yr.spend,i>0?years[i-1].spend:null)}));
  const maxSpend=Math.max(...rows.map(r=>r.spend),1);
  const sameMo=years.map(yr=>({year:yr.year,spend:filteredCycleSpend(cycleKey(yr.year,cm))}));

  // Category YoY — use purchaseCycle (fixed)
  const activeCats=analysisCatFilter?[analysisCatFilter]:[...new Set(state.products.map(p=>p.category).filter(Boolean))];
  const catYoY={};
  activeCats.forEach(cat=>{
    const vals=years.map(yr=>state.purchases.filter(p=>{
      const pc=p.purchaseCycle||p.cycle;
      const prod=state.products.find(pr=>pr.id===p.productId);
      return yr.months.includes(pc)&&(prod?.category||'Other')===cat;
    }).reduce((s,p)=>s+p.price*p.qty,0));
    if(vals.some(v=>v>0))catYoY[cat]=vals;

  return`
  <div class="card">
    <div class="card-title">Year-over-Year${analysisCatFilter?' — '+analysisCatFilter:''}</div>

      <div style="font-family:var(--mono);font-size:11px;width:85px;text-align:right;">${r.spend>0?formatMoney(r.spend):'—'}</div>
      <div style="font-family:var(--mono);font-size:11px;width:58px;text-align:right;color:${r.diff.color}">${r.diff.arrow} ${r.diff.text}</div>
    </div>`;}).join('')}
  </div>
  <div class="card">
    <div class="card-title">Same Month YoY — ${new Date(2000,cm-1).toLocaleString('en',{month:'long'})}</div>
    ${sameMo.map((r,i)=>{const d=diffLabel(r.spend,i>0?sameMo[i-1].spend:null);const mx=Math.max(...sameMo.map(x=>x.spend),1);return`<div class="analysis-row">
      <div style="min-width:65px;font-family:var(--mono);font-size:11px;color:${r.year===cy?'var(--accent4)':'var(--text2)'}">${formatCycleLabel(cycleKey(r.year,cm))}</div>
      <div class="analysis-bar-wrap" style="flex:1"><div class="analysis-bar" style="width:${Math.max(Math.round(r.spend/mx*100),2)}%;background:var(--accent4)"></div></div>
      <div style="font-family:var(--mono);font-size:11px;width:85px;text-align:right;">${r.spend>0?formatMoney(r.spend):'—'}</div>
      <div style="font-family:var(--mono);font-size:11px;width:58px;text-align:right;color:${d.color}">${d.arrow} ${d.text}</div>
    </div>`;}).join('')}
  </div>
  ${Object.keys(catYoY).length>0?`
  <div class="card">
    <div class="card-title">Category YoY</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:10px;font-family:var(--mono);">
        <thead><tr>
          <th style="text-align:left;padding:5px 3px;color:var(--text3);">CAT</th>
          ${years.map(yr=>`<th style="text-align:right;padding:5px 3px;color:${yr.year===cy?'var(--accent4)':'var(--text3)'};">${yr.year}</th>`).join('')}
        </tr></thead>
        <tbody>${Object.entries(catYoY).map(([cat,vals])=>`
          <tr>
            <td style="padding:4px 3px;color:${CAT_COLORS[cat]||'var(--text2)'};">${cat}</td>

// ===================== PRICE TRACKER =====================
function renderPriceTracker() {
  const cycles=allCycles();
  const fromDefault=priceFromCycle||(cycles.length>1?cycles[0]:'');
  const toDefault=priceToCycle||(cycles.length>0?cycles[cycles.length-1]:'');
  const inRange=c=>(!fromDefault||!toDefault)||(c>=fromDefault&&c<=toDefault);
  const products=state.products.filter(p=>state.purchases.some(b=>b.productId===p.id&&b.price>0));
  const priceRows=products
    .filter(p=>!priceProductFilter||p.name.toLowerCase().includes(priceProductFilter.toLowerCase())||(p.category||'').toLowerCase().includes(priceProductFilter.toLowerCase()))
    .map(p=>{
      const history=state.purchases.filter(b=>b.productId===p.id&&b.price>0&&inRange(b.purchaseCycle||b.cycle)).sort((a,b)=>(a.purchaseCycle||a.cycle).localeCompare(b.purchaseCycle||b.cycle));
      if(!history.length)return null;
      const first=history[0].price,last=history[history.length-1].price;
      const max=Math.max(...history.map(h=>h.price)),min=Math.min(...history.map(h=>h.price));
      return{p,history,first,last,max,min,diff:diffLabel(last,first)};
    }).filter(Boolean);
  const avgs=priceRows.map(r=>r.diff.raw).filter(v=>!isNaN(v)&&v!==0);
  const avgInflation=avgs.length?avgs.reduce((s,v)=>s+v,0)/avgs.length:null;

  return`
  <div class="card" style="margin-bottom:12px;">
    <div class="card-title">Price Tracker</div>
    <div class="form-row" style="margin-bottom:10px;">
      <div class="form-group"><label>From</label>
        <select onchange="priceFromCycle=this.value;renderTab()">
          <option value="">Earliest</option>
          ${cycles.map(c=>`<option value="${c}" ${c===fromDefault?'selected':''}>${formatCycleLabel(c)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>To</label>
        <select onchange="priceToCycle=this.value;renderTab()">
          <option value="">Latest</option>
          ${cycles.map(c=>`<option value="${c}" ${c===toDefault?'selected':''}>${formatCycleLabel(c)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Filter Product / Category</label>
      <input type="text" value="${priceProductFilter}" placeholder="e.g. Rice, Proteins..." oninput="priceProductFilter=this.value;renderTab()">
    </div>
    ${avgInflation!==null?`
    <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;display:flex;gap:16px;align-items:center;">
      <div><div class="stat-label">Avg Price Change</div>
        <div style="font-size:22px;font-weight:800;color:${avgInflation>0?'var(--accent3)':'var(--accent)'}">${avgInflation>0?'+':''}${avgInflation.toFixed(1)}%</div>
      </div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;">
        Across <strong style="color:var(--text)">${priceRows.length}</strong> products<br>
        ${fromDefault&&toDefault?`${formatCycleLabel(fromDefault)} → ${formatCycleLabel(toDefault)}`:'All time'}
      </div>
    </div>`:''}
  </div>
  ${priceRows.length===0?`<div class="empty"><div class="empty-icon">📊</div><h3>No price history</h3><p>Log purchases with prices to start tracking.</p></div>`:''}
  ${priceRows.map(({p,history,first,last,max,min,diff})=>{
    const catColor=CAT_COLORS[p.category]||'#8b8fa0';
    const maxVal=Math.max(...history.map(h=>h.price),1);
    return`<div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div><div style="font-size:13px;font-weight:800;">${p.name}</div><div style="font-size:10px;color:${catColor}">${p.category}</div></div>
        <div style="text-align:right;"><div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent)">${formatMoney(last)}</div>
          <div style="font-family:var(--mono);font-size:11px;color:${diff.color}">${diff.arrow} ${diff.text}</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">First: <strong style="color:var(--text)">${formatMoney(first)}</strong></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Min: <strong style="color:var(--accent2)">${formatMoney(min)}</strong></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">Max: <strong style="color:var(--accent3)">${formatMoney(max)}</strong></span>
      </div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:36px;margin-bottom:6px;">
        ${history.map((h,i)=>{const ht=Math.max(6,Math.round((h.price/maxVal)*36));const prev=i>0?history[i-1].price:null;const col=prev===null?'var(--text3)':h.price>prev?'var(--accent3)':'var(--accent)';return`<div title="${formatCycleLabel(h.purchaseCycle||h.cycle)}: ${formatMoney(h.price)}" style="flex:1;min-width:5px;height:${ht}px;background:${col};border-radius:2px 2px 0 0;"></div>`;}).join('')}
      </div>
      <table style="width:100%;font-family:var(--mono);font-size:10px;border-collapse:collapse;">
        ${history.map((h,i)=>{const d=diffLabel(h.price,i>0?history[i-1].price:null);return`<tr>
          <td style="padding:2px 3px;color:var(--text3)">${formatCycleLabel(h.purchaseCycle||h.cycle)}</td>
          <td style="padding:2px 3px;text-align:right;color:var(--text)">${formatMoney(h.price)}</td>
          <td style="padding:2px 3px;text-align:right;color:${d.color}">${d.arrow} ${d.text}</td>
          <td style="padding:2px 3px;color:var(--text3)">${h.store||'—'}</td>
        </tr>`;}).join('')}
      </table>
    </div>`;
  }).join('')}`;
}

// ADD PRODUCT
function openAddProduct() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Add Product</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">${productFormFields(null)}</div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="saveProduct()">Save Product</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  `);
  document.getElementById('f-store').addEventListener('change', function() {
    document.getElementById('new-store-wrap').style.display = this.value === '__new' ? '' : 'none';
  });
}

function saveProduct(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Product name required'); return; }

  let store = document.getElementById('f-store').value;
  if (store === '__new') {
    store = document.getElementById('f-newstore').value.trim();
    if (store && !state.stores.includes(store)) state.stores.push(store);
  }

  const product = {
    id: id || 'p_' + Date.now(),
    name,
    category: document.getElementById('f-cat').value,
    cycle: document.getElementById('f-cycle').value,
    plannedQty: parseFloat(document.getElementById('f-planned').value) || 0,
    unit: document.getElementById('f-unit').value,
    price: parseFloat(document.getElementById('f-price').value) || 0,
    currentStock: parseFloat(document.getElementById('f-stock').value) || 0,
    store,
    updatedAt: new Date().toISOString()
  };

  if (id) {
    const idx = state.products.findIndex(p => p.id === id);
    if (idx !== -1) state.products[idx] = product;
  } else {
    state.products.push(product);
  }

  saveData();
  showToast('Product saved!');
  closeModal();
}

function openEditProduct(id) {
  const p = state.products.find(pr => pr.id === id);
  if (!p) return;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Edit Product</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">${productFormFields(p)}</div>
    <div style="margin-top:12px;display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="openUpdateStock('${id}')">📊 Update Stock Only</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="saveProduct('${id}')">Update</button>
      <button class="btn btn-danger btn-sm" onclick="deleteProduct('${id}')">Delete</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  `);
  document.getElementById('f-store').addEventListener('change', function() {
    document.getElementById('new-store-wrap').style.display = this.value === '__new' ? '' : 'none';
  });
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  state.products = state.products.filter(p => p.id !== id);
  saveData();
  showToast('Product deleted');
  closeModal();
}

function saveUpdateStock(id) {
  const p = state.products.find(pr => pr.id === id);
  if (!p) return;
  const type = document.getElementById('us-type').value;
  const val = parseFloat(document.getElementById('us-val').value) || 0;
  const note = document.getElementById('us-note').value.trim();
  const oldStock = p.currentStock || 0;
  if (type === 'set') p.currentStock = val;
  else if (type === 'add') p.currentStock = oldStock + val;
  else p.currentStock = Math.max(0, oldStock - val);

  state.monthEndLogs.push({
    id: 'log_' + Date.now(),
    cycle: state.settings.currentCycle,
    date: new Date().toISOString().split('T')[0],
    type: 'stock-update',
    note: `Stock update: ${p.name} → ${oldStock} → ${p.currentStock} ${p.unit||''}${note ? ' (' + note + ')' : ''}`
  });
  saveData();
  showToast('Stock updated!');
  closeModal();
}

function buildCycleOptions(centerCycle, before, after) {
  const [y, m] = centerCycle.split('-').map(Number);
  const options = [];
  for (let i = -before; i <= after; i++) {
    let mo = m + i; let yr = y;
    while (mo <= 0) { mo += 12; yr--; }
    while (mo > 12) { mo -= 12; yr++; }
    options.push(`${yr}-${String(mo).padStart(2,'0')}`);
  }
  return options;
}

function dateTocycle(dateStr) {
  if (!dateStr) return state.settings.currentCycle;
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function syncCycleFromDate(dateStr) {
  const cycleInput = document.getElementById('fp-cycle');
  if (cycleInput) cycleInput.value = dateTocycle(dateStr);
}

function fillPurchaseDefaults(id) {
  if (!id || id === '__new') {
    document.getElementById('fp-newname-wrap').style.display = id === '__new' ? '' : 'none';
    document.getElementById('fp-lastprice-hint').style.display = 'none';
    return;
  }
  const p = state.products.find(pr => pr.id === id);
  if (!p) return;

  // Find last actual purchase price
  const lastBuy = state.purchases.filter(b => b.productId === id).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
  const lastPrice = lastBuy ? lastBuy.price : p.price;
  const lastStore = lastBuy ? lastBuy.store : p.store;
  const lastDate = lastBuy ? lastBuy.date : null;

  if (lastPrice) {
    document.getElementById('fp-price').value = lastPrice;
    const hint = document.getElementById('fp-lastprice-hint');
    hint.style.display = '';
    hint.innerHTML = `Last paid: <strong style="color:var(--accent)">${state.settings.currency}${parseFloat(lastPrice).toFixed(2)}</strong>${lastDate ? ` on ${lastDate}` : ''}${lastStore ? ` @ ${lastStore}` : ''} — <em style="color:var(--text2)">edit above if price changed</em>`;
  }
  if (lastStore && state.stores.includes(lastStore)) {
    document.getElementById('fp-store').value = lastStore;
  }
}

function savePurchase() {
  const productId = document.getElementById('fp-product').value;
  const qty = parseFloat(document.getElementById('fp-qty').value) || 1;
  const price = parseFloat(document.getElementById('fp-price').value) || 0;
  const store = document.getElementById('fp-store').value;
  const date = document.getElementById('fp-date').value;
  // SEPARATE: when bought vs what it's for
  const purchaseCycle = document.getElementById('fp-purchase-cycle')?.value || dateTocycle(date);
  const stockingCycle = document.getElementById('fp-stocking-cycle')?.value || state.settings.currentCycle;
  const stockingQuarter = document.getElementById('fp-stocking-quarter')?.value || null;
  const purchaseType = document.getElementById('fp-ptype')?.value || 'monthly';
  const isExtra = purchaseType === 'top-up' || document.getElementById('fp-extra')?.checked;

  let productName = '';
  let unit = '';
  let productCycleType = 'monthly';

  if (productId === '__new') {
    productName = document.getElementById('fp-newname').value.trim();
    if (!productName) { showToast('Please enter item name'); return; }
  } else {
    const p = state.products.find(pr => pr.id === productId);
    if (!p) { showToast('Select a product'); return; }
    productName = p.name;
    unit = p.unit;
    productCycleType = p.cycle || 'monthly';
    p.currentStock = (p.currentStock || 0) + qty;
    if (store) p.store = store;
    if (price && price !== p.price) p.price = price;
  }

  const purchase = {
    id: 'buy_' + Date.now(),
    productId: productId === '__new' ? null : productId,
    productName, qty, price, store, date,
    purchaseCycle, cycle: purchaseCycle,
    stockingCycle,
    stockingQuarter: productCycleType === 'quarterly' ? (stockingQuarter || quarterOf(stockingCycle)) : null,
    purchaseType,
    isExtra,
    unit
  };

  state.purchases.push(purchase);

  const typeLabel = purchaseType === 'top-up' ? '⚡ Top-up' : purchaseType === 'quarterly' ? '📦 Quarterly' : '🛒 Monthly';
  state.monthEndLogs.push({
    id: 'log_' + Date.now(),
    cycle: stockingCycle, purchaseCycle, date,
    type: purchaseType,
    note: `${typeLabel}: ${qty} ${unit} of ${productName} — ${state.settings.currency}${parseFloat(price).toFixed(2)}/unit · Total: ${state.settings.currency}${(price*qty).toFixed(2)} @ ${store || '—'} [bought: ${formatCycleLabel(purchaseCycle)}, for: ${formatCycleLabel(stockingCycle)}${stockingQuarter ? ' / '+stockingQuarter : ''}]`
  });

  saveData();
  showToast('Purchase logged!');
  closeModal();
}

function quarterOf(cycle) {
  if (!cycle) return 'Q1';
  const m = parseInt(cycle.split('-')[1]);
  return `Q${Math.ceil(m/3)}`;
}

function saveEditPurchase(id) {
  const p = state.purchases.find(b => b.id === id);
  if (!p) return;

  const oldQty = p.qty;
  const newQty = parseFloat(document.getElementById('ep-qty').value) || p.qty;
  const newPrice = parseFloat(document.getElementById('ep-price').value) || p.price;
  const newStore = document.getElementById('ep-store').value;
  const newDate = document.getElementById('ep-date').value;
  const newPurchaseCycle = document.getElementById('ep-purchase-cycle')?.value || dateTocycle(newDate);
  const newStockingCycle = document.getElementById('ep-stocking-cycle')?.value || p.stockingCycle || p.cycle;
  const newStockingQuarter = document.getElementById('ep-stocking-quarter')?.value || p.stockingQuarter || null;
  const newExtra = document.getElementById('ep-extra').checked;

  // Adjust stock if qty changed
  if (p.productId) {
    const prod = state.products.find(pr => pr.id === p.productId);
    if (prod) {
      prod.currentStock = Math.max(0, (prod.currentStock || 0) - oldQty + newQty);
      if (newPrice) prod.price = newPrice;
      if (newStore) prod.store = newStore;
    }
  }

  p.qty = newQty;
  p.price = newPrice;
  p.store = newStore;
  p.date = newDate;
  p.purchaseCycle = newPurchaseCycle;
  p.cycle = newPurchaseCycle; // backwards compat
  p.stockingCycle = newStockingCycle;
  p.stockingQuarter = newStockingQuarter;
  p.isExtra = newExtra;

  saveData();
  showToast('Purchase updated!');
  closeModal();
}

function deletePurchase(id) {
  const p = state.purchases.find(b => b.id === id);
  if (!p) return;
  if (!confirm(`Delete this purchase of ${p.productName}?`)) return;

  // Reverse stock adjustment
  if (p.productId) {
    const prod = state.products.find(pr => pr.id === p.productId);
    if (prod) prod.currentStock = Math.max(0, (prod.currentStock||0) - p.qty);
  }

  state.purchases = state.purchases.filter(b => b.id !== id);
  saveData();
  showToast('Purchase deleted');
  closeModal();
}

function manualSnapshot() {

function viewSnapshot(snapId) {
  const snap = (state.stockSnapshots||[]).find(s => s.id === snapId);
  if (!snap) return;
  const cats = [...new Set(snap.items.map(i => i.category))].filter(Boolean).sort();

    <div style="display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid var(--border);">

    </div>`).join('')}
  </div>`).join('')}

    <button class="btn btn-teal" onclick="exportSnapshot('${snapId}')">Export CSV</button>

  </div>`);
}

function exportSnapshot(snapId) {
  const snap = (state.stockSnapshots||[]).find(s => s.id === snapId);
  if (!snap) return;
  const rows = [['Name','Category','Unit','Stock','Planned','Price','Date','Cycle']];
  snap.items.forEach(i => rows.push([i.name,i.category,i.unit,i.currentStock,i.plannedQty,i.price,snap.date,snap.cycle]));
  downloadCSV(toCSV(rows), `pantryos-snapshot-${snap.date}.csv`);
  showToast('Snapshot exported!');
}

      onchange="meStockEdits['${p.id}']=parseFloat(this.value)||0">
  </div>`).join('')}
  <div class="modal-actions">
    <button class="btn btn-primary" style="flex:1" onclick="completeME()">Close Cycle & Start Next</button>
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
  </div>`);

function completeME() {
  const cycle = state.settings.currentCycle;

  // Apply stock updates
  state.products.forEach(p => {
    if (meStockEdits[p.id] !== undefined) p.currentStock = meStockEdits[p.id];
    else if (meStockUpdates && meStockUpdates[p.id] !== undefined) p.currentStock = meStockUpdates[p.id];
  });

  // Process stock-out decisions
  const failures = [], toppedUp = [], intentional = [];
  Object.entries(meStockoutDecisions).forEach(([id, decision]) => {
    const prod = state.products.find(p => p.id === id);
    if (!prod) return;
    if (decision === 'failure') failures.push(prod.name);
    else if (decision === 'topped-up') toppedUp.push(prod.name);
    else if (decision === 'intentional') intentional.push(prod.name);
  });

  const stockouts = state.products.filter(p => (p.currentStock||0) === 0 && p.plannedQty > 0).length;
  const overstocked = state.products.filter(p => (p.currentStock||0) > (p.plannedQty||0) * 1.5).length;

  let note = `✓ Cycle ${formatCycleLabel(cycle)} closed. ${stockouts} stock-outs, ${overstocked} overstocked.`;
  if (failures.length) note += ` Failed to restock: ${failures.join(', ')}.`;
  if (toppedUp.length) note += ` Topped up mid-cycle: ${toppedUp.join(', ')}.`;
  if (intentional.length) note += ` Intentional gaps: ${intentional.join(', ')}.`;

  state.monthEndLogs.push({ id:'log_'+Date.now(), cycle, date:new Date().toISOString().split('T')[0], type:'close', note });

  // Auto-snapshot before rolling cycle
  takeStockSnapshot(`Month-End ${formatCycleLabel(cycle)}`);

  // Move to next cycle
  const [y, m] = cycle.split('-').map(Number);
  const next = m === 12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`;
  state.settings.currentCycle = next;

  // Reset wizard state
  meStockEdits = {};
  meStockoutDecisions = {};

  saveData();
  showToast(`Cycle closed! Now in ${formatCycleLabel(next)}`);
  closeModal();
}

// ===================== CSV FUNCTIONS =====================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function toCSV(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  const lines = [headers.join(',')];
  rows.forEach(r => {
    lines.push(headers.map(h => {
      const v = String(r[h] || '');
      return v.includes(',') ? `"${v}"` : v;
    }).join(','));
  });
  return lines.join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function importProductsCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      let added = 0, updated = 0;
      rows.forEach(row => {
        const name = (row.name || row.Name || '').trim();
        if (!name) return;
        const existing = state.products.find(p => p.name.toLowerCase() === name.toLowerCase());
        const product = {
          id: existing?.id || 'p_' + Date.now() + Math.random(),
          name,
          category: row.category || row.Category || 'Other',
          unit: row.unit || row.Unit || '',
          plannedQty: parseFloat(row.plannedQty || row.planned_qty || 0),
          price: parseFloat(row.price || row.Price || 0),
          store: row.store || row.Store || '',
          cycle: (row.cycle || row.Cycle || 'monthly').toLowerCase(),
          currentStock: parseFloat(row.currentStock || row.current_stock || 0),
          updatedAt: row.updatedAt || row.updated_at || new Date().toISOString()
        };
        if (!state.stores.includes(product.store) && product.store) state.stores.push(product.store);
        if (existing) { Object.assign(existing, product); updated++; }
        else { state.products.push(product); added++; }
      });
      saveData();
      showToast(`Imported: ${added} added, ${updated} updated`);
      renderTab();
    } catch(err) {
      showToast('Import error: check CSV format');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function importPurchasesCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      let added = 0;
      rows.forEach(row => {
        const productName = (row.productName || row.product_name || row.name || '').trim();
        if (!productName) return;
        const product = state.products.find(p => p.name.toLowerCase() === productName.toLowerCase());
        const purchase = {
          id: 'buy_' + Date.now() + Math.random(),
          productId: product?.id || null,
          productName,
          qty: parseFloat(row.qty || row.quantity || 1),
          price: parseFloat(row.price || 0),
          store: row.store || '',
          date: row.date || new Date().toISOString().split('T')[0],
          purchaseCycle: row.purchaseCycle || row.cycle || state.settings.currentCycle,
          stockingCycle: row.stockingCycle || row.cycle || state.settings.currentCycle,
          cycle: row.purchaseCycle || row.cycle || state.settings.currentCycle,
          purchaseType: row.purchaseType || 'monthly',
          isExtra: (row.isExtra || row.is_extra || 'false').toLowerCase() === 'true',
          unit: product?.unit || row.unit || '',
          stockingQuarter: row.stockingQuarter || null
        };
        state.purchases.push(purchase);
        if (product) product.currentStock = (product.currentStock || 0) + purchase.qty;
        added++;
      });
      saveData();
      showToast(`${added} purchases imported`);
      renderTab();
    } catch(err) {
      showToast('Import error: check CSV format');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportProducts() {
  const rows = state.products.map(p => ({
    name: p.name,
    category: p.category,
    unit: p.unit,

  }));
  downloadCSV(toCSV(rows), `pantryos-purchases-${state.settings.currentCycle}.csv`);

function exportShoppingList() {
  const cycle = state.settings.currentCycle;
  const needed = state.products.filter(p => p._shopOverride || (p.currentStock||0) < (p.plannedQty||0));
  const rows = needed.map(p => {
    const e = shopEdits[p.id] || {};
    const needQty = e.qty != null ? e.qty : Math.max(0, (p.plannedQty||0) - (p.currentStock||0));
    const usePrice = e.price != null ? e.price : (p.price || 0);
    const useStore = e.store || p.store || '';
    return {
      name: p.name, category: p.category, unit: p.unit,
      needQty, pricePerUnit: usePrice,
      estimatedCost: (needQty * usePrice).toFixed(2),
      store: useStore, cycle: p.cycle
    };
  });
  downloadCSV(toCSV(rows), `pantryos-shopping-list-${cycle}.csv`);
  showToast('Shopping list exported!');
}

  if (!document.getElementById('gis-script')) {
    const s = document.createElement('script');

    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => {
