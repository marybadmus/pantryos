        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: state.settings.gClientId,
          scope: SCOPES,
          callback: onTokenResponse
        });
      }
    };
    document.head.appendChild(s);
  }
  if (!document.getElementById('gapi-script')) {
    const s = document.createElement('script');
    s.id = 'gapi-script';
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => {
      gapi.load('client', async () => {
        await gapi.client.init({});
        await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
        gapiReady = true;
      });
    };
    document.head.appendChild(s);
  }
}

function onTokenResponse(resp) {
  if (resp.error) { showToast('Auth failed: ' + resp.error); return; }
  gapi.client.setToken(resp);
  state.settings.sheetsConnected = true;
  saveData();
  renderSheetsUI();
  if (pendingAction === 'push') sheetsPushAll();
  else if (pendingAction === 'pull') sheetsPullAll();
  pendingAction = null;
}

function connectSheets() {
  const clientId = document.getElementById('g-clientid').value.trim();
  const sheetId = document.getElementById('g-sheetid').value.trim();
  if (!clientId) { showToast('Enter your OAuth Client ID'); return; }
  if (!sheetId) { showToast('Enter your Sheet ID'); return; }
  state.settings.gClientId = clientId;
  state.settings.sheetId = sheetId;
  saveData();
  loadGoogleAPIs();
  setTimeout(() => {
    if (typeof google === 'undefined' || !google.accounts) { showToast('Still loading, try again in 2s'); return; }
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id: clientId, scope: SCOPES, callback: onTokenResponse });
    pendingAction = 'push';
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }, 2000);
  showToast('Loading Google APIs...');
}

function disconnectSheets() {
  try {
    const tok = gapi.client.getToken();
    if (tok) { google.accounts.oauth2.revoke(tok.access_token, ()=>{}); gapi.client.setToken(null); }
  } catch(e) {}
  state.settings.sheetsConnected = false;
  saveData();
  renderSheetsUI();
  showToast('Disconnected');
}

function ensureToken(action) {
  if (!state.settings.gClientId) { showToast('Not connected. Go to CSV tab.'); return false; }
  try {
    const token = gapi.client.getToken();
    if (!token) { pendingAction = action; tokenClient.requestAccessToken({ prompt: '' }); return false; }
  } catch(e) { showToast('Auth error — reconnect in CSV tab'); return false; }
  return true;
}

async function sheetsPushAll() {
  if (!ensureToken('push')) return;
  setSyncStatus('Pushing...');
  try {
    const sid = state.settings.sheetId;
    await ensureSheetTabs(sid, ['Products','Purchases','MonthLogs','_Validation']);

    // Products
    const prodRows = [['id','name','category','unit','plannedQty','price','store','cycle','currentStock','updatedAt']];
    state.products.forEach(p => prodRows.push([p.id,p.name,p.category||'',p.unit||'',p.plannedQty||0,p.price||0,p.store||'',p.cycle||'monthly',p.currentStock||0,p.updatedAt||'']));

    // Purchases (with new fields)
    const buyRows = [['id','productId','productName','qty','price','store','date','purchaseCycle','stockingCycle','purchaseType','isExtra','unit','stockingQuarter']];
    state.purchases.forEach(p => buyRows.push([p.id,p.productId||'',p.productName||'',p.qty||0,p.price||0,p.store||'',p.date||'',p.purchaseCycle||p.cycle||'',p.stockingCycle||p.cycle||'',p.purchaseType||'monthly',p.isExtra?'TRUE':'FALSE',p.unit||'',p.stockingQuarter||'']));

    // Logs
    const logRows = [['id','cycle','date','type','note']];
    state.monthEndLogs.forEach(l => logRows.push([l.id,l.cycle||'',l.date||'',l.type||'',l.note||'']));

    // Validation lists (for Sheets dropdown validation)
    const maxLen = Math.max(allCategories().length, allUnits().length, allStores().length, state.products.length, PURCHASE_TYPES.length);
    const valRows = [['Products','Categories','Units','Stores','PurchaseTypes','Cycles']];
    for (let i=0; i<maxLen; i++) {
      valRows.push([
        state.products[i]?.name||'',
        allCategories()[i]||'',
        allUnits()[i]||'',
        allStores()[i]||'',
        PURCHASE_TYPES[i]||'',
        allCycles()[i]||''
      ]);
    }

    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId: sid,
      resource: {
        valueInputOption: 'USER_ENTERED',
        data: [
          { range: 'Products!A1', values: prodRows },
          { range: 'Purchases!A1', values: buyRows },
          { range: 'MonthLogs!A1', values: logRows },
          { range: '_Validation!A1', values: valRows }
        ]
      }
    });

    const now = new Date().toLocaleString();
    state.settings.lastSync = now;
    saveData();
    setSyncStatus('✓ Pushed at ' + now);
    showToast('Pushed to Google Sheets!');
  } catch(e) {
    setSyncStatus('Push failed: ' + (e.result?.error?.message || e.message));
    showToast('Push failed — see setup guide');
    console.error(e);
  }
}

async function sheetsPushStockOnly() {
  if (!ensureToken('push')) return;
  setSyncStatus('Pushing stock balances...');
  try {
    const sid = state.settings.sheetId;
    // Read existing Products sheet to find the currentStock column index
    const existing = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: sid, range: 'Products!A1:Z1'
    });
    const headers = (existing.result.values||[[]])[0] || [];
    const stockCol = headers.indexOf('currentStock');
    const nameCol = headers.indexOf('name');
    if (stockCol === -1 || nameCol === -1) {
      showToast('Push All first to set up sheet headers');
      setSyncStatus('Push Stock failed: run Push to Sheets first');
      return;
    }

    // Read all product names from sheet to match rows
    const allRows = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: sid, range: `Products!A2:A5000`
    });
    const sheetNames = (allRows.result.values||[]).map(r => (r[0]||'').toLowerCase().trim());

    // Build targeted cell updates only for currentStock column
    const colLetter = String.fromCharCode(65 + stockCol);
    const updates = [];
    state.products.forEach(p => {
      const rowIdx = sheetNames.findIndex(n => n === (p.name||'').toLowerCase().trim());
      if (rowIdx !== -1) {
        updates.push({ range: `Products!${colLetter}${rowIdx + 2}`, values: [[p.currentStock||0]] });
      }
    });

    if (!updates.length) { showToast('No matching products found in sheet'); return; }

    await gapi.client.sheets.spreadsheets.values.batchUpdate({
      spreadsheetId: sid,
      resource: { valueInputOption: 'USER_ENTERED', data: updates }
    });

    const now = new Date().toLocaleString();
    state.settings.lastSync = now;
    saveData();
    setSyncStatus('✓ Stock balances pushed at ' + now);
    showToast(`Stock balances pushed for ${updates.length} products!`);
  } catch(e) {
    setSyncStatus('Push Stock failed: ' + (e.result?.error?.message || e.message));
    showToast('Push Stock failed');
    console.error(e);
  }
}

async function sheetsPullAll() {
  if (!ensureToken('pull')) return;
  setSyncStatus('Pulling...');
  try {
    const sid = state.settings.sheetId;
    const [prodResp, buyResp, logResp] = await Promise.all([
      Promise.resolve(gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: sid, range: 'Products!A1:Z5000' })),
      Promise.resolve(gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: sid, range: 'Purchases!A1:Z10000' })),
      Promise.resolve(gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: sid, range: 'MonthLogs!A1:Z2000' })).catch(() => ({result:{values:[]}}))
    ]);

    const parseSheet = (resp) => {
      const rows = resp.result.values || [];
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h,i) => obj[h] = row[i]||'');
        return obj;
      });
    };

    // Helper: strip commas, currency symbols, spaces before parsing numbers
    // Handles values like "80,000" or "₦3,500" correctly
    const parseNum = (val) => {
      if (val === null || val === undefined || val === '') return 0;
      const cleaned = String(val).replace(/[₦$€£,\s]/g, '');
      return parseFloat(cleaned) || 0;
    };

    const products = parseSheet(prodResp).map(r => ({
      id: r.id||'p_'+Date.now()+Math.random(), name: r.name||'',
      category: r.category||'Other', unit: r.unit||'',
      plannedQty: parseNum(r.plannedQty), price: parseNum(r.price),
      store: r.store||'', cycle: r.cycle||'monthly',
      currentStock: parseNum(r.currentStock), updatedAt: r.updatedAt||''
    })).filter(p => p.name);

    const purchases = parseSheet(buyResp).map(r => {
      // Fall back to the product's own unit if purchase unit is blank
      const productUnit = r.unit || (() => {
        const match = products.find(p =>
          p.name.toLowerCase() === (r.productName||'').toLowerCase() ||
          (r.productId && p.id === r.productId)
        );
        return match ? match.unit : '';
      })();
      return {
        id: r.id||'buy_'+Date.now()+Math.random(), productId: r.productId||null,
        productName: r.productName||'', qty: parseNum(r.qty),
        price: parseNum(r.price), store: r.store||'', date: r.date||'',
        purchaseCycle: r.purchaseCycle||r.cycle||'',
        stockingCycle: r.stockingCycle||r.cycle||'',
        cycle: r.purchaseCycle||r.cycle||'',
        purchaseType: r.purchaseType||'monthly',
        isExtra: r.isExtra==='TRUE', unit: productUnit,
        stockingQuarter: r.stockingQuarter||null
      };
    }).filter(p => p.productName);

    const logs = parseSheet(logResp).map(r => ({
      id: r.id||'log_'+Date.now()+Math.random(),
      cycle: r.cycle||'', date: r.date||'', type: r.type||'note', note: r.note||''
    }));

    state.products = mergeById(state.products, products);
    state.purchases = mergeById(state.purchases, purchases);
    state.monthEndLogs = mergeById(state.monthEndLogs, logs);
    products.forEach(p => { if (p.store && !state.stores.includes(p.store)) state.stores.push(p.store); });

    const now = new Date().toLocaleString();
    state.settings.lastSync = now;
    saveData();
    setSyncStatus('✓ Pulled at ' + now);
    showToast('Pulled from Google Sheets!');
    renderTab();
  } catch(e) {
    setSyncStatus('Pull failed: ' + (e.result?.error?.message || e.message));
    showToast('Pull failed — see setup guide');
    console.error(e);
  }
}

function mergeById(local, remote) {
  // For products: merge by name to prevent duplicates when sheet IDs differ
  const isProduct = remote.length > 0 && remote[0].hasOwnProperty('plannedQty');
  if (isProduct) {
    const nameMap = {};
    local.forEach(i => { if(i.name) nameMap[i.name.toLowerCase()] = i; });
    remote.forEach(i => {
      if (!i.name) return;
      const key = i.name.toLowerCase();
      const existing = nameMap[key];
      // Preserve local id if remote id looks auto-generated
      if (existing && (!i.id || i.id.startsWith('p_'))) {
        nameMap[key] = { ...i, id: existing.id };
      } else {
        nameMap[key] = i;
      }
    });
    return Object.values(nameMap);
  }
  // For purchases and logs: merge by id
  const map = {};
  local.forEach(i => { if(i.id) map[i.id] = i; });
  remote.forEach(i => { if(i.id) map[i.id] = i; });
  return Object.values(map);
}

async function ensureSheetTabs(sid, names) {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: sid });
  const existing = (meta.result.sheets||[]).map(s => s.properties.title);
  const toAdd = names.filter(n => !existing.includes(n));
  if (!toAdd.length) return;
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: sid,
    resource: { requests: toAdd.map(t => ({ addSheet: { properties: { title: t } } })) }
  });
}

function renderWeeklyMealPlan(withMatch) {
  // Seed based on current week number so plan varies week-on-week but is stable within a week
  const now = new Date();
  const weekNum = Math.floor((now - new Date(now.getFullYear(),0,1)) / 604800000);
  function seededRand(seed) {
    let s = seed;
    return function() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
  }
  const rand = seededRand(weekNum * 31 + 7);

  const stockNames = state.products.filter(p => (p.currentStock||0) > 0).map(p => p.name.toLowerCase());
  function hasIngredient(ing) {
    return stockNames.some(s => s.includes(ing.toLowerCase()) || ing.toLowerCase().includes(s));
  }

  // Classify recipes
  const available = withMatch.filter(r => r.pct >= 60).map(r => r.name);
  const swallows = ['Pounded Yam','Eba & Vegetable Soup','Amala & Ewedu','Tuwo Shinkafa'];
  const riceDishes = ['Jollof Rice','Fried Rice','Ofada Rice & Ayamase'];
  const soups = ['Egusi Soup','Ogbono Soup','Oha Soup','Afang Soup','Okra Soup','Efo Riro','Edikaikong','Banga Soup (Ofe Akwu)','Groundnut Soup'];
  const easyMeals = ['Beans & Plantain','Moi Moi','Akara','Fried Plantain (Dodo)','Stewed Beans','Pepper Soup','Jollof Spaghetti','Suya'];

  // Helper: pick from list preferring available stock, seeded shuffle
  function pick(list, exclude) {
    let pool = list.filter(m => available.includes(m) && !exclude.includes(m));
    if (!pool.length) pool = list.filter(m => !exclude.includes(m));
    if (!pool.length) pool = list;
    return pool[Math.floor(rand() * pool.length)];
  }

  // Build 7-day plan following the rules:
  // Sunday: Rice dish → carries Monday lunch + Tuesday lunch
  // Swallow max 2x in the week
  // Easy, nourishing meals (postpartum family of 3)
  // Vary by week using seeded random

  const used = [];
  let swallowCount = 0;

  // Sunday: pick rice dish
  const sundayRice = pick(riceDishes, used);
  used.push(sundayRice);

  // Pick 2 soups (for swallow days and stew base)
  const soup1 = pick(soups, used);
  used.push(soup1);
  const soup2 = pick(soups, used);
  used.push(soup2);

  // Swallow days (max 2): Wed and Fri by default, but shift by week
  const swallowDays = weekNum % 2 === 0 ? [2, 4] : [3, 5]; // Wed+Fri or Thu+Sat
  const swallow1 = pick(swallows, used);
  used.push(swallow1);
  const swallow2 = pick(swallows, used);
  used.push(swallow2);

  // Easy meals for remaining slots
  const easy1 = pick(easyMeals, used); used.push(easy1);
  const easy2 = pick(easyMeals, used); used.push(easy2);
  const easy3 = pick(easyMeals, used); used.push(easy3);

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const CARRY = '🍚 Leftover from Sunday';

  // Assign meals
  // Sun: Rice, Mon: Rice leftovers (lunch) + easy dinner, Tue: Rice leftovers (lunch) + soup
  // Wed: swallow1 + soup1, Thu: easy, Fri: swallow2 + soup2, Sat: easy
  const plan = [
    { day:'Sunday',    lunch: sundayRice,  dinner: sundayRice,  note:'Cook big pot — feeds Mon & Tue too' },
    { day:'Monday',    lunch: CARRY,       dinner: easy1,       note:'Use Sunday rice for lunch' },
    { day:'Tuesday',   lunch: CARRY,       dinner: `${soup1} + Eba/Rice`, note:'Finish Sunday rice at lunch' },
    { day:'Wednesday', lunch: swallow1,    dinner: easy2,       note:'Swallow day 1 of 2' },
    { day:'Thursday',  lunch: easy3,       dinner: `${soup2}`,  note:'Light & nourishing' },
    { day:'Friday',    lunch: swallow2,    dinner: `${soup2} + Rice`, note:'Swallow day 2 of 2' },
    { day:'Saturday',  lunch: `Beans & Plantain`, dinner: `Pepper Soup or light soup`, note:'Easy weekend meal' },
  ];

  const dayColors = ['var(--accent4)','var(--accent)','var(--accent)','var(--accent2)','var(--accent4)','var(--accent2)','var(--accent3)'];

  return `
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;">
    <div style="font-size:12px;color:var(--text2);line-height:1.7;">
      📋 <strong style="color:var(--text);">Week ${weekNum} plan</strong> — tailored for a family of 3, easy postpartum meals.<br>
      <span style="color:var(--text3);font-size:11px;">Plan refreshes automatically each week. Swallow appears max twice.</span>
    </div>
  </div>

  ${plan.map((d, i) => `
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div style="font-size:13px;font-weight:800;color:${dayColors[i]};">${d.day}</div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);">${d.note}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div style="background:var(--surface);border-radius:8px;padding:8px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">Lunch</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);">${d.lunch}</div>
      </div>
      <div style="background:var(--surface);border-radius:8px;padding:8px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">Dinner</div>
        <div style="font-size:12px;font-weight:600;color:var(--text);">${d.dinner}</div>
      </div>
    </div>
  </div>`).join('')}

  <div style="margin-top:4px;padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.7;">
    💡 <strong style="color:var(--text2);">Postpartum tip:</strong> Cook in bulk on Sunday & Wednesday. Keep pepper soup ingredients handy — it's quick, nourishing and great for recovery. Beans & Moi Moi are excellent protein sources for breastfeeding.
  </div>`;
}

function recipeCard(r, color) {
  const stockNames = state.products.filter(p => (p.currentStock||0) > 0).map(p => p.name.toLowerCase());
  return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div style="font-size:13px;font-weight:800;">${r.name}</div>
      <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:${color};">${r.pct}%</div>
    </div>
    <div style="background:var(--border);border-radius:4px;height:3px;margin-bottom:8px;">
      <div style="height:3px;border-radius:4px;background:${color};width:${r.pct}%;"></div>
    </div>
    <div style="font-size:11px;color:var(--text2);line-height:1.7;">
      Have: ${r.have.join(', ')||'—'}
    </div>
    ${r.missing.length > 0 ? `
    <div style="font-size:11px;color:var(--accent3);margin-top:4px;">Need: ${r.missing.join(', ')}</div>
    <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="addMissingToShopList(${JSON.stringify(r.missing).replace(/"/g,'&quot;')})">+ Add missing to shopping list</button>
    ` : ''}
  </div>`;
}

function addMissingToShopList(missingArr) {
  if (typeof missingArr === 'string') missingArr = JSON.parse(missingArr);
  let added = 0;
  missingArr.forEach(ing => {
    const exists = state.products.find(p => p.name.toLowerCase() === ing.toLowerCase() || p.name.toLowerCase().includes(ing.toLowerCase()));
    if (!exists) {
      const newProd = {id:'p_'+Date.now()+'_'+Math.random(), name:ing, category:'Other', unit:'Piece', plannedQty:1, price:0, store:'', cycle:'monthly', currentStock:0, _shopOverride:true};
      state.products.push(newProd);
      added++;
    } else {
      if (!exists._shopOverride) exists._shopOverride = true;
    }
  });
  saveData();
  showTab('shopping');
  showToast(`${missingArr.length} missing ingredient${missingArr.length>1?'s':''} added to shopping list`);
}

// ===================== GOOGLE DRIVE BACKUP =====================
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const SHEETS_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
const SCOPES = SHEETS_SCOPE + ' ' + DRIVE_SCOPE;
let driveBackupFileId = state.settings.driveFileId || null;

async function driveBackup() {
  if (!state.settings.sheetsConnected) return;
  if (typeof gapi === 'undefined' || !gapi.client) return;
  try {
    const token = gapi.client.getToken();
    if (!token) return;
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const metadata = {name:'PantryOS-Backup.json', mimeType:'application/json'};

    if (driveBackupFileId) {
      // Update existing file
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
      form.append('file', blob);
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveBackupFileId}?uploadType=multipart`, {
        method:'PATCH', headers:{'Authorization':'Bearer '+token.access_token}, body:form
      });
    } else {
      // Create new file
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
      form.append('file', blob);
      const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method:'POST', headers:{'Authorization':'Bearer '+token.access_token}, body:form
      });
      const result = await resp.json();
      driveBackupFileId = result.id;
      state.settings.driveFileId = result.id;
    }
    state.settings.lastBackup = new Date().toLocaleTimeString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    console.log('Drive backup saved');
  } catch(e) {
    console.warn('Drive backup failed:', e);
  }
}

// ===================== SETTINGS (custom units, categories) =====================
function addCustomUnit() {
  const val = document.getElementById('s-newunit').value.trim();
  if (!val) return;
  if (allUnits().includes(val)) { showToast('Unit already exists'); return; }
  if (!state.customUnits) state.customUnits = [];
  state.customUnits.push(val);
  saveData(); showToast('Unit added!'); renderTab();
}

function removeCustomUnit(idx) {
  state.customUnits.splice(idx, 1);
  saveData(); renderTab();
}

function addCustomCategory() {
  const val = document.getElementById('s-newcat').value.trim();
  if (!val) return;
  if (allCategories().includes(val)) { showToast('Category already exists'); return; }
  if (!state.customCategories) state.customCategories = [];
  state.customCategories.push(val);
  saveData(); showToast('Category added!'); renderTab();
}

function deduplicateProducts() {
  const nameMap = {};
  state.products.forEach(p => {
    const key = (p.name||'').toLowerCase().trim();
    if (!key) return;
    if (!nameMap[key]) nameMap[key] = [];
    nameMap[key].push(p);
  });
  let removed = 0;
  const cleaned = [];
  Object.values(nameMap).forEach(group => {
    if (group.length === 1) { cleaned.push(group[0]); return; }
    // Keep the one with the most data (highest price, or most recently updated)
    group.sort((a,b) => {
      if (a.updatedAt && b.updatedAt) return b.updatedAt.localeCompare(a.updatedAt);
      return (b.price||0) - (a.price||0);
    });
    cleaned.push(group[0]);
    removed += group.length - 1;
  });
  state.products = cleaned;
  saveData();
  showToast(removed + ' duplicate' + (removed>1?'s':'') + ' removed!');
  renderTab();
}

function removeCustomCategory(idx) {
  state.customCategories.splice(idx, 1);
  saveData(); renderTab();
}
